version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sportlink-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sportlink
      POSTGRES_PASSWORD: sportlink
      POSTGRES_DB: sportlink
    ports:
      - '5432:5432'
    volumes:
      - sportlink_pgdata:/var/lib/postgresql/data

  mongo:
    image: mongo:7-jammy
    container_name: sportlink-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - sportlink_mongodata:/data/db

volumes:
  sportlink_pgdata:
  sportlink_mongodata:
